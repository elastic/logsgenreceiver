name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'logsgenreceiver/go.mod'

      - name: Run tests
        run: |
          cd logsgenreceiver
          go test -v ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'logsgenreceiver/go.mod'

      - name: Install OpenTelemetry builder
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.139.0

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          PROJECT_NAME=$(basename $GITHUB_REPOSITORY)
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi
          builder --config builder-config.yaml
          mv logsgen-dev/logsgen "logsgen-dev/${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}${EXT}"

      - name: Archive binary
        run: |
          PROJECT_NAME=$(basename $GITHUB_REPOSITORY)
          cd logsgen-dev
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}.zip" "${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}.exe"
            echo "ARTIFACT_PATH=${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}.zip" >> $GITHUB_ENV
          else
            tar czf "${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" "${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}"
            echo "ARTIFACT_PATH=${PROJECT_NAME}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build
          path: logsgen-dev/${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: logsgen-dev

      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Tag name: $TAG_NAME"

          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --generate-notes

          echo "Created release for tag $TAG_NAME"

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          find logsgen-dev -type f | while read -r artifact; do
            filename=$(basename "$artifact")
            echo "Uploading $artifact as $filename"

            gh release upload "$TAG_NAME" "$artifact" --clobber
          done
