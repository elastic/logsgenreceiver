resourceLogs:
  - resource:
      attributes:
        - key: cloud.account.id
          value:
            stringValue: "{{.RandomFrom `111111111111` `222222222222` `333333333333`}}"
        - key: cloud.availability_zone
          value:
            stringValue: "{{.ModFrom .InstanceID `eu-west-1a` `eu-west-1b` `eu-west-1c`}}"
        - key: cloud.platform
          value:
            stringValue: "EC2"
        - key: cloud.provider
          value:
            stringValue: "aws"
        - key: cloud.region
          value:
            stringValue: "eu-west-1"
        - key: host.arch
          value:
            stringValue: "{{.RandomFrom `aarch64` `x86_64`}}"
        - key: host.id
          value:
            stringValue: "{{.RandomHex 32}}"
        - key: host.name
          value:
            stringValue: "ip-10-0-{{$nodes := 3}}{{if and .Vars .Vars.nodes}}{{$nodes = .Vars.nodes}}{{end}}{{.Mod .InstanceID $nodes}}-0.eu-west-1.compute.internal"
        - key: host.type
          value:
            stringValue: "{{.RandomFrom `c6g.2xlarge` `c6g.4xlarge` `m6g.2xlarge`}}"
        - key: k8s.cluster.name
          value:
            stringValue: "{{.RandomFrom `production-cluster` `staging-cluster`}}"
        - key: k8s.namespace.name
          value:
            stringValue: "{{.ModFrom .InstanceID `default` `backend` `services`}}"
        - key: k8s.node.name
          value:
            stringValue: "ip-10-0-{{$nodes := 3}}{{if and .Vars .Vars.nodes}}{{$nodes = .Vars.nodes}}{{end}}{{.Mod .InstanceID $nodes}}-0.eu-west-1.compute.internal"
        - key: k8s.pod.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}-{{.RandomHex 10}}"
        - key: k8s.pod.uid
          value:
            stringValue: "{{.UUID}}"
        - key: k8s.container.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: container.id
          value:
            stringValue: "{{.RandomHex 64}}"
        - key: container.image.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: container.image.tag
          value:
            stringValue: "{{.RandomFrom `v1.2.3` `v1.3.0` `v1.3.1`}}"
        - key: service.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: k8s.pod.label.app.kubernetes.io/name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: k8s.pod.label.app.kubernetes.io/instance
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: k8s.pod.label.app.kubernetes.io/version
          value:
            stringValue: "{{.RandomFrom `v1.2.3` `v1.3.0` `v1.3.1`}}"
        - key: k8s.pod.label.app.kubernetes.io/component
          value:
            stringValue: "{{.ModFrom .InstanceID `gateway` `api` `api` `api` `worker`}}"
        - key: k8s.pod.label.team
          value:
            stringValue: "{{.ModFrom .InstanceID `platform` `payments` `growth` `infrastructure`}}"
        - key: telemetry.sdk.name
          value:
            stringValue: "opentelemetry"
        - key: telemetry.sdk.language
          value:
            stringValue: "go"
        - key: k8s.node.uid
          value:
            stringValue: "{{.UUID}}"
        - key: k8s.replicaset.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}-{{.RandomHex 10}}"
        - key: k8s.deployment.name
          value:
            stringValue: "{{.ModFrom .InstanceID `api-gateway` `user-service` `order-service` `payment-service` `notification-service`}}"
        - key: os.type
          value:
            stringValue: "linux"
    scopeLogs:
      - scope:
          name: "log-generator"
        logRecords: []
